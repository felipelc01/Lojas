<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AutoStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white">

    <!-- HEADER -->
    <header class="flex justify-between items-center p-4 bg-slate-900 shadow">
        <h1 class="text-xl font-bold">🚗 AutoStore</h1>

        <div class="flex gap-2">
            <button onclick="abrirLogin()" class="bg-blue-600 px-4 py-2 rounded">Login</button>
            <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded">Sair</button>
        </div>
    </header>

    <!-- HERO -->
    <section class="h-[60vh] bg-cover bg-center flex items-center justify-center"
        style="background-image:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70')">

        <div class="bg-black/70 p-8 rounded-xl text-center">
            <h1 class="text-3xl font-bold mb-2">Encontre seu veículo ideal</h1>
            <p class="mb-4">Carros e motos revisados</p>

            <div class="flex gap-2">
                <input id="search" class="p-2 rounded text-black" placeholder="Buscar...">
                <button onclick="buscar()" class="bg-blue-600 px-4 rounded">Buscar</button>
            </div>
        </div>

    </section>

    <!-- FILTROS -->
    <div class="flex justify-center my-6">

        <div class="bg-slate-900 p-2 rounded-full flex gap-2 shadow-lg">

            <button onclick="filtrarTipo('todos', this)"
                class="filtro-btn ativo bg-blue-600 px-4 py-2 rounded-full text-sm">
                🚀 Todos
            </button>

            <button onclick="filtrarTipo('carro', this)" class="filtro-btn bg-slate-800 px-4 py-2 rounded-full text-sm">
                🚗 Carros
            </button>

            <button onclick="filtrarTipo('moto', this)" class="filtro-btn bg-slate-800 px-4 py-2 rounded-full text-sm">
                🏍️ Motos
            </button>

        </div>

    </div>

    <!-- ESTOQUE -->
    <section class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" id="estoque"></section>

    <!-- ADMIN -->
    <section id="admin" class="hidden p-6 mt-6">

        <div class="max-w-4xl mx-auto bg-slate-900 p-6 rounded-2xl shadow-lg">

            <h2 class="text-2xl font-bold mb-6">Adicionar Veículo</h2>


            <div class="mb-6">

                <h3 class="text-lg font-semibold mb-2">Editar Anúncio</h3>

                <select id="listaVeiculos" onchange="selecionarVeiculo()" class="w-full p-3 rounded bg-slate-800">

                    <option value="">Selecione um veículo</option>

                </select>

            </div>

            <!-- GRID -->
            <div class="grid md:grid-cols-2 gap-4">

                <input id="nome" placeholder="Nome do veículo" class="p-3 rounded bg-slate-800">

                <input id="preco" placeholder="Preço" class="p-3 rounded bg-slate-800">

                <select id="tipo" class="p-3 rounded bg-slate-800">
                    <option value="carro">Carro</option>
                    <option value="moto">Moto</option>
                </select>

            </div>

            <!-- DESCRIÇÃO -->
            <textarea id="descricao" placeholder="Descrição detalhada"
                class="mt-4 w-full p-3 rounded bg-slate-800 h-28"></textarea>

            <!-- INFORMAÇÕES -->
            <textarea id="info" placeholder="Informações (uma por linha)"
                class="mt-4 w-full p-3 rounded bg-slate-800 h-28"></textarea>

            <!-- TAGS -->
            <input id="tags" placeholder="Tags (separadas por vírgula)" class="mt-4 w-full p-3 rounded bg-slate-800">

            <!-- UPLOAD -->
            <div class="mt-6">

                <h3 class="mb-2 font-semibold">Imagens do veículo</h3>

                <label
                    class="block border-2 border-dashed border-slate-700 p-6 text-center rounded-xl cursor-pointer hover:bg-slate-800 transition">

                    📁 Clique para selecionar imagens

                    <input type="file" id="uploadImagens" multiple accept="image/*" class="hidden">

                </label>

                <!-- PREVIEW -->
                <div id="preview" class="grid grid-cols-3 gap-3 mt-4"></div>

            </div>

            <!-- BOTÃO -->
            <button onclick="salvarVeiculo()" id="btnSalvar"
                class="mt-6 w-full bg-green-600 p-3 rounded-xl font-semibold">

                Publicar Veículo

            </button>

            <!-- USUÁRIOS -->
            <div id="usuarios" class="mt-8">
                <h3 class="text-xl mb-2">Usuários</h3>
                <ul id="listaUsuarios"></ul>
            </div>

        </div>

    </section>

    <!-- LOGIN -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

        <div class="bg-slate-900 p-6 rounded w-80">
            <h3 class="mb-3">Login</h3>

            <input id="user" placeholder="Usuário" class="p-2 w-full mb-2 text-black">
            <input id="pass" type="password" placeholder="Senha" class="p-2 w-full mb-3 text-black">

            <button onclick="login()" class="bg-blue-600 w-full p-2 rounded">Entrar</button>
        </div>

    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
